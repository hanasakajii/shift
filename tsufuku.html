<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="津福">
<link rel="manifest" href="/shift/manifest-tsufuku.json">
<link rel="apple-touch-icon" href="/shift/icon.png">
<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #f5f5f3; }
  iframe { width: 100%; height: 100%; border: none; display: block; }
</style>
</head>
<body>
<iframe id="app-frame"></iframe>
<script>
  // app.html は毎回タイムスタンプ付きで読み込み、常に最新版を取得する
  document.getElementById("app-frame").src = "/shift/app.html?v=" + Date.now() + "#tsufuku";
</script>
</body>
</html>
