<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="マスター">
<link rel="manifest" href="/shift/manifest-master.json">
<link rel="apple-touch-icon" href="/shift/icon.png">
<script>
  // マニフェストのstart_url（/shift/#zendoji など）からの起動時、
  // 付与されているハッシュをそのままapp.htmlへ引き継ぐ。
  // ハッシュが無い場合（直接 /shift/ にアクセスした場合）のみマスターにする。
  const h = location.hash || '#master';
  location.replace('/shift/app.html' + h);
</script>
</head>
<body></body>
</html>
