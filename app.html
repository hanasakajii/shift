// ============================================================
// STAFF DRAG & DROP (Desktop) + TOUCH SORT (Mobile)
// ============================================================
let _dragSrcIdx = null;
let _touchSrcIdx = null;
let _touchClone = null;
let _touchLongTimer = null;
let _touchDragging = false;

// --- Desktop drag ---
function staffDragStart(e, idx) {
  _dragSrcIdx = idx;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => {
    const el = document.getElementById(`staff-item-${idx}`);
    if (el) el.classList.add('dragging');
  }, 0);
}

function staffDragOver(e, idx) {
  e.preventDefault();
  document.querySelectorAll('.staff-list-item.drag-over').forEach(el => el.classList.remove('drag-over'));
  if (idx !== _dragSrcIdx) {
    const el = document.getElementById(`staff-item-${idx}`);
    if (el) el.classList.add('drag-over');
  }
}

function staffDragEnd(e) {
  const overEl = document.querySelector('.staff-list-item.drag-over');
  if (overEl && _dragSrcIdx !== null) {
    const destIdx = parseInt(overEl.dataset.idx);
    reorderStaff(_dragSrcIdx, destIdx);
  }
  document.querySelectorAll('.staff-list-item.dragging, .staff-list-item.drag-over')
    .forEach(el => el.classList.remove('dragging','drag-over'));
  _dragSrcIdx = null;
}

// --- Touch drag (long press to start) ---
function staffTouchStart(e, idx) {
  _touchSrcIdx = idx;
  _touchDragging = false;
  _touchLongTimer = setTimeout(() => {
    _touchDragging = true;
    // クローン要素を作成して追従させる
    const srcEl = document.getElementById(`staff-item-${idx}`);
    if (!srcEl) return;
    _touchClone = srcEl.cloneNode(true);
    _touchClone.style.cssText = `
      position:fixed; z-index:999; width:${srcEl.offsetWidth}px;
      opacity:0.85; background:var(--card); border-radius:var(--radius-sm);
      box-shadow:0 4px 20px rgba(0,0,0,0.2); pointer-events:none;
      border:1px solid var(--border);
    `;
    const rect = srcEl.getBoundingClientRect();
    _touchClone.style.left = rect.left + 'px';
    _touchClone.style.top = rect.top + 'px';
    document.body.appendChild(_touchClone);
    srcEl.classList.add('dragging');
    // バイブレーション（対応端末のみ）
    if (navigator.vibrate) navigator.vibrate(30);
  }, 400);
}

function staffTouchMove(e) {
  if (!_touchDragging) {
    // 長押し前に動いたらキャンセル
    if (Math.abs(e.touches[0].clientX) > 5 || Math.abs(e.touches[0].clientY) > 5) {
      clearTimeout(_touchLongTimer);
    }
    return;
  }
  e.preventDefault();
  const touch = e.touches[0];
  if (_touchClone) {
    _touchClone.style.left = (touch.clientX - _touchClone.offsetWidth / 2) + 'px';
    _touchClone.style.top = (touch.clientY - 24) + 'px';
  }
  // どのアイテムの上にいるか判定
  document.querySelectorAll('.staff-list-item.drag-over').forEach(el => el.classList.remove('drag-over'));
  const els = document.querySelectorAll('.staff-list-item:not(.dragging)');
  for (const el of els) {
    const rect = el.getBoundingClientRect();
    if (touch.clientY >= rect.top && touch.clientY <= rect.bottom) {
      el.classList.add('drag-over');
      break;
    }
  }
}

function staffTouchEnd(e) {
  clearTimeout(_touchLongTimer);
  if (_touchDragging) {
    const overEl = document.querySelector('.staff-list-item.drag-over');
    if (overEl && _touchSrcIdx !== null) {
      const destIdx = parseInt(overEl.dataset.idx);
      reorderStaff(_touchSrcIdx, destIdx);
    }
    document.querySelectorAll('.staff-list-item.dragging, .staff-list-item.drag-over')
      .forEach(el => el.classList.remove('dragging','drag-over'));
    if (_touchClone) { _touchClone.remove(); _touchClone = null; }
  }
  _touchDragging = false;
  _touchSrcIdx = null;
}

async function reorderStaff(fromIdx, toIdx) {
  if (fromIdx === toIdx) return;
  const staff = staffData[staffMgmtStore].staff;
  const item = staff.splice(fromIdx, 1)[0];
  staff.splice(toIdx, 0, item);
  await saveStaffData(staffMgmtStore);
  renderStaffMgmt();
}

async function resetShiftData() {
  if (!await customConfirm('スタッフ設定は残ります。', { title: 'シフトデータをリセット', okLabel: 'リセット', okClass: 'danger' })) return;
  const logEl = document.getElementById('reset-log');
  logEl.style.display = 'block';
  logEl.textContent = '削除中...';
  // 前月から12ヶ月分を動的生成
  const now = new Date();
  const months = [];
  for (let i = -1; i <= 12; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() + i, 1);
    months.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
  }
  let count = 0;
  for (const store of STORES) {
    for (const ym of months) {
      await kvSet(`shift:${store.key}:${ym}`, JSON.stringify({}));
      if (!shiftData[store.key]) shiftData[store.key] = {};
      shiftData[store.key][ym] = {};
      count++;
    }
  }
  await kvSet('updateLog', JSON.stringify([]));
  updateLog = [];
  logEl.textContent = `完了！${count}件のシフトデータを削除しました。`;
  showToast('シフトデータをリセットしました');
  renderCurrentTab();
}

async function resetAllData() {

  const logEl = document.getElementById('reset-log');

  const now = new Date();

    const d = new Date(now.getFullYear(), now.getMonth() + i, 1);
    months.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
  }
  for (const store of STORES) {
    for (const ym of months) {
      await kvSet(`shift:${store.key}:${ym}`, JSON.stringify({}));
      if (!shiftData[store.key]) shiftData[store.key] = {};

}

async function addStaff() {
  const name = document.getElementById('new-staff-name').value.trim();
  if (!name) { showToast('名前を入力してください'); return; }
  if (!staffData[staffMgmtStore]) staffData[staffMgmtStore] = { staff: [], minStaff: 5 };
  const exists = staffData[staffMgmtStore].staff.some(s => (typeof s === 'string' ? s : s.name) === name);
  if (exists) { showToast('すでに登録されています'); return; }
  staffData[staffMgmtStore].staff.push({ name, type: newStaffType });
  const ok = await saveStaffData(staffMgmtStore);
  if (ok) {
    showToast(`${name}を追加しました`);
  } else {
    staffData[staffMgmtStore].staff.pop();
    showToast('保存に失敗しました。通信を確認してください');
    return;

  renderStaffMgmt();
}

async function addSpecialClosed() {
  const val = document.getElementById('special-close-date').value.trim();
  if (!/^\d{4}-\d{2}-\d{2}$/.test(val)) { showToast('YYYY-MM-DD形式で入力してください'); return; }
  if (!staffData[staffMgmtStore]) staffData[staffMgmtStore] = { staff: [], minStaff: 5 };
  if (!staffData[staffMgmtStore].specialClosedDates) staffData[staffMgmtStore].specialClosedDates = [];
  if (!staffData[staffMgmtStore].specialClosedDates.includes(val)) {
    staffData[staffMgmtStore].specialClosedDates.push(val);
    staffData[staffMgmtStore].specialClosedDates.sort();
  }
  await saveStaffData(staffMgmtStore);
  showToast('特別休業日を追加しました');
  renderStaffMgmt();
}

async function removeSpecialClosed(date) {
  staffData[staffMgmtStore].specialClosedDates = staffData[staffMgmtStore].specialClosedDates.filter(d => d !== date);
  await saveStaffData(staffMgmtStore);
  showToast('削除しました');
  renderStaffMgmt();
}

function openMoveStaff(name) {
  const otherStores = STORES.filter(s => s.key !== staffMgmtStore);
  const opts = otherStores.map(s => `<option value="${s.key}">${s.name}</option>`).join('');
  const html = `
    <div class="modal-overlay open" id="move-modal">
      <div class="modal">
        <div class="modal-title">${name}の移動先</div>
        <select class="store-select" id="move-dest" style="margin-bottom:16px;">${opts}</select>
        <button class="btn-primary" onclick="executeMove('${name}')">移動する</button>
        <button class="btn-secondary" onclick="document.getElementById('move-modal').remove()">キャンセル</button>
      </div>
    </div>
  `;
  document.body.insertAdjacentHTML('beforeend', html);
}

async function executeMove(name) {
  const destKey = document.getElementById('move-dest').value;
  if (!staffData[destKey]) staffData[destKey] = { staff: [], minStaff: 5 };
  const movingStaff = (staffData[staffMgmtStore]?.staff ?? []).find(s => (typeof s === 'string' ? s : s.name) === name) ?? { name, type: 'seishain' };
  staffData[staffMgmtStore].staff = staffData[staffMgmtStore].staff.filter(s => (typeof s === 'string' ? s : s.name) !== name);
  const alreadyExists = staffData[destKey].staff.some(s => (typeof s === 'string' ? s : s.name) === name);
  if (!alreadyExists) staffData[destKey].staff.push(movingStaff);
  await saveStaffData(staffMgmtStore);
  await saveStaffData(destKey);
  const destName = STORE_MAP[destKey]?.name??destKey;
  document.getElementById('move-modal').remove();
  showToast(`${name}を${destName}に移動しました`);
  renderStaffMgmt();
}

// confirm()の代替カスタムモーダル
function customConfirm(message, { title = '確認', okLabel = 'OK', okClass = 'primary', cancelLabel = 'キャンセル' } = {}) {
  return new Promise(resolve => {
    const overlay = document.getElementById('custom-modal-overlay');
    document.getElementById('custom-modal-title').textContent = title;
    document.getElementById('custom-modal-message').textContent = message;
    document.getElementById('custom-modal-buttons').innerHTML = `
      <button class="custom-modal-btn cancel" id="modal-cancel">${cancelLabel}</button>
      <button class="custom-modal-btn ${okClass}" id="modal-ok">${okLabel}</button>
    `;
    overlay.classList.add('open');
    const close = (result) => {
      overlay.classList.remove('open');
      resolve(result);
    };
    document.getElementById('modal-ok').onclick = () => close(true);
    document.getElementById('modal-cancel').onclick = () => close(false);
    overlay.onclick = (e) => { if (e.target === overlay) close(false); };
  });
}

function showLoading() {
  document.getElementById('content').innerHTML = `<div class="loading"><div class="spinner"></div></div>`;

function showToast(msg) {
  const t = document.getElementById('toast');

  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ============================================================
// PUSH NOTIFICATIONS
// ============================================================
async function initPush() {
  // プッシュ非対応環境では何もしない

  try {
    // Service Worker登録
    const reg = await navigator.serviceWorker.register('/shift/sw.js');

    // 通知許可を取得
    const permission = await Notification.requestPermission();
    if (permission !== 'granted') return;

    // 既存の購読確認
    let sub = await reg.pushManager.getSubscription();
    if (!sub) {
      // 新規購読
      sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
      });
    }

    // 購読情報をWorkerに送信
    const storeKey = isMaster ? 'master' : currentStore?.key;
    if (storeKey) {
      await fetch(`${WORKER_URL}/push/subscribe`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ storeKey, subscription: sub.toJSON() })
      });
    }
  } catch(e) {
    // 無視
  }
}

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = window.atob(base64);
  const outputArray = new Uint8Array(rawData.length);
  for (let i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
  return outputArray;
}

// 通知送信ヘルパー
async function sendPushToStores(targets, title, body) {
  try {
    await fetch(`${WORKER_URL}/push/send`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ targets, title, body })
    });
  } catch(e) { /* 通知失敗は無視 */ }
}
